use_default_settings: true

general:
  instance_name: "AI Stack Search"
  debug: false

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: ${SEARXNG_SECRET:-ai-stack-searxng-secret}
  limiter: false  # Disable rate limiting for local use
  image_proxy: true

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "en"

outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0

ui:
  default_theme: simple
  default_locale: en

engines:
  # Enable specific engines as needed
  - name: duckduckgo
    disabled: false
  - name: wikipedia
    disabled: false
  - name: arxiv
    disabled: false

redis:
  url: redis://valkey:6379/0

# SearXNG Configuration — AI Stack
# External: http://localhost:7863  (compose maps host:7863 → container:8080)
# Internal: http://searxng:8080   (used by open-webui on ai-stack-network)

general:
  debug: false
  instance_name: "AI Stack Search"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true
  open_metrics: ''

brand:
  new_issue_url: https://github.com/searxng/searxng/issues/new
  docs_url: https://docs.searxng.org/
  public_instances: https://searx.space
  wiki_url: https://github.com/searxng/searxng/wiki
  issue_url: https://github.com/searxng/searxng/issues

search:
  safe_search: 0
  autocomplete: "duckduckgo"       # was: "" — enables inline suggestions
  autocomplete_min: 3              # was: 4
  favicon_resolver: "duckduckgo"   # was: "" — shows favicons in results
  default_lang: "auto"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  suspended_times:
    SearxEngineAccessDenied: 180
    SearxEngineCaptcha: 3600
    SearxEngineTooManyRequests: 180
    cf_SearxEngineCaptcha: 1296000
    cf_SearxEngineAccessDenied: 86400
    recaptcha_SearxEngineCaptcha: 604800
  formats:
    - html
    - json   # required for Open WebUI RAG queries

server:
  port: 8080                        # FIX: was 8888 — must match compose port mapping
  bind_address: "0.0.0.0"          # FIX: was 127.0.0.1 — 0.0.0.0 required in container
  base_url: false                   # overridden by ${SEARXNG_BASE_URL}
  limiter: false                    # private instance — no rate limiting needed
  public_instance: false
  secret_key: "changeme"           # overridden by ${SEARXNG_SECRET} from compose env
  image_proxy: true                 # proxy images through searxng (better privacy)
  http_protocol_version: "1.1"     # FIX: was "1.0"
  method: "GET"                    # FIX: was "POST" — GET reduces bot detection triggers
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

valkey:
  # FIX: was false — valkey caching is critical for:
  #   1. Deduplicating repeat queries (reduces engine hits → less bot detection)
  #   2. Session handling
  #   3. Limiter state (even when limiter: false, helps internally)
  url: valkey://valkey:6379/0

ui:
  static_path: ""
  templates_path: ""
  query_in_title: false
  default_theme: simple
  center_alignment: false
  default_locale: ""
  theme_args:
    simple_style: auto
  search_on_category_select: true
  hotkeys: default
  url_formatting: pretty

# Outgoing HTTP settings (requests to search engines)
outgoing:
  request_timeout: 5.0            # FIX: was 3.0 — 3s cuts off slower engines (scholar, arxiv)
  max_request_timeout: 15.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true              # HTTP/2 for supported engines (Google, Bing, Brave)

plugins:
  searx.plugins.calculator.SXNGPlugin:
    active: true

  searx.plugins.infinite_scroll.SXNGPlugin:
    active: false

  searx.plugins.hash_plugin.SXNGPlugin:
    active: true

  searx.plugins.self_info.SXNGPlugin:
    active: true

  searx.plugins.unit_converter.SXNGPlugin:
    active: true

  searx.plugins.ahmia_filter.SXNGPlugin:
    active: true

  searx.plugins.hostnames.SXNGPlugin:
    active: true

  searx.plugins.time_zone.SXNGPlugin:
    active: true

  searx.plugins.oa_doi_rewrite.SXNGPlugin:
    active: false

  searx.plugins.tor_check.SXNGPlugin:
    active: false

  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: true

categories_as_tabs:
  general:
  images:
  videos:
  news:
  map:
  music:
  it:
  science:
  files:
  social media:


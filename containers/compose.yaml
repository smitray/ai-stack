services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=aistack
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
      - OPENWEBUI_DB_PASSWORD=${OPENWEBUI_DB_PASSWORD:?OPENWEBUI_DB_PASSWORD not set}
    volumes:
      - type: volume
        source: postgres-data
        target: /var/lib/postgresql/data
        volume:
          nocopy: false
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aistack" ]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - ai-stack

  valkey:
    image: docker.io/valkey/valkey:8-alpine
    container_name: valkey
    command: valkey-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - type: volume
        source: valkey-data
        target: /data
        volume:
          nocopy: false
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 384m
    restart: unless-stopped
    networks:
      - ai-stack

  qdrant:
    image: docker.io/qdrant/qdrant:v1.13.4
    container_name: qdrant
    volumes:
      - type: bind
        source: ${AI_STACK_CONFIG_DIR:-${XDG_CONFIG_HOME:-$HOME/.config}/ai-stack}/qdrant/production.yaml
        target: /qdrant/config/production.yaml
        read_only: true
      - type: volume
        source: qdrant-storage
        target: /qdrant/storage
        volume:
          nocopy: false
      - type: volume
        source: qdrant-snapshots
        target: /qdrant/snapshots
        volume:
          nocopy: false
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:6333/readyz || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - ai-stack

  searxng:
    image: docker.io/searxng/searxng:2025.2.15
    container_name: searxng
    ports:
      - "7863:8080"
    volumes:
      - type: bind
        source: ${AI_STACK_CONFIG_DIR:-${XDG_CONFIG_HOME:-$HOME/.config}/ai-stack}/searxng
        target: /etc/searxng
    environment:
      - BASE_URL=http://localhost:7863/
      - SEARXNG_SECRET=${SEARXNG_SECRET:?SEARXNG_SECRET not set}
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    restart: unless-stopped
    networks:
      - ai-stack

  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.5.16
    container_name: openwebui
    ports:
      - "7860:8080"
    environment:
      - WEBUI_AUTH=false
      - OPENAI_API_BASE_URL=http://host.containers.internal:7865/v1
      - RAG_EMBEDDING_ENGINE=
      - RAG_EMBEDDING_MODEL=nomic-ai/nomic-embed-text-v1.5
      - RAG_EMBEDDING_BATCH_SIZE=26
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?WEBUI_SECRET_KEY not set}
      - OPENWEBUI_DATABASE_URL=postgresql://openwebui:${OPENWEBUI_DB_PASSWORD}@postgres:5432/openwebui
      # Speech-to-Text Configuration (STT Proxy with VRAM management)
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=http://host.containers.internal:7866/v1
      - AUDIO_STT_OPENAI_API_KEY=sk-no-key-required
      - AUDIO_STT_MODEL=whisper-stt
    volumes:
      - type: volume
        source: open-webui-data
        target: /app/backend/data
        volume:
          nocopy: false
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      searxng:
        condition: service_started
    mem_limit: 1g
    restart: unless-stopped
    networks:
      - ai-stack

  n8n:
    image: docker.io/n8nio/n8n:1.80.5
    container_name: n8n
    ports:
      - "7862:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:7862/
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - type: volume
        source: n8n-data
        target: /home/node/.n8n
        volume:
          nocopy: false
    mem_limit: 1g
    restart: unless-stopped
    networks:
      - ai-stack

volumes:
  postgres-data:
    name: ai-stack-postgres-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${AI_STACK_DATA_DIR:-$HOME/.local/share/ai-stack}/volumes/postgres
  valkey-data:
    name: ai-stack-valkey-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${AI_STACK_DATA_DIR:-$HOME/.local/share/ai-stack}/volumes/valkey
  qdrant-storage:
    name: ai-stack-qdrant-storage
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${AI_STACK_DATA_DIR:-$HOME/.local/share/ai-stack}/volumes/qdrant/storage
  qdrant-snapshots:
    name: ai-stack-qdrant-snapshots
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${AI_STACK_DATA_DIR:-$HOME/.local/share/ai-stack}/volumes/qdrant/snapshots
  open-webui-data:
    name: ai-stack-open-webui-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${AI_STACK_DATA_DIR:-$HOME/.local/share/ai-stack}/volumes/open-webui
  n8n-data:
    name: ai-stack-n8n-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${AI_STACK_DATA_DIR:-$HOME/.local/share/ai-stack}/volumes/n8n

networks:
  ai-stack:
    name: ai-stack-network
    driver: bridge

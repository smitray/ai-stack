model_list:
  # Local LLM (llama.cpp on bare-metal)
  - model_name: local-llama
    litellm_params:
      model: openai/local-llama
      api_base: http://host.containers.internal:8080/v1
      api_key: sk-no-key-required
  # Cloud fallbacks
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-pro
      api_key: os.environ/GOOGLE_API_KEY
  - model_name: claude-3-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: groq-llama-3
    litellm_params:
      model: groq/llama3-8b-8192
      api_key: os.environ/GROQ_API_KEY
  - model_name: openrouter-auto
    litellm_params:
      model: openrouter/auto
      api_key: os.environ/OPENROUTER_API_KEY

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL
  cache: true
  cache_params:
    type: redis
    host: valkey
    port: 6379
    db: 1
  # Fallback: local → cloud
  fallbacks:
    - local-llama: [gemini-pro, groq-llama-3]
  # Context window fallback
  context_window_fallbacks:
    - local-llama: [gemini-pro]

router_settings:
  allowed_fails: 3
  cooldown_time: 60
  retry_policy:
    TimeoutError: 2
    InternalServerError: 3

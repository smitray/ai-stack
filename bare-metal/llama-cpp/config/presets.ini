[default]
# Router mode settings - ONE model at a time for 4GB VRAM constraint
models-max = 1
sleep-idle-seconds = 300

# GPU settings for RTX 3050 Laptop
n-gpu-layers = 99

# Context and performance
ctx-size = 4096
flash-attn = true
cache-type-k = q4_0
cache-type-v = q4_0

# Default model (auto-downloaded from HuggingFace on first use)
[qwen-3b-chat]
# HF repo with quantization tag - auto-downloads via HF CLI
hf-repo = unsloth/Qwen3.5-4B-GGUF:Q4_K_M
load-on-startup = true
version = 1

[*]
# Router mode settings - ONE model at a time for 4GB VRAM constraint
models-max = 1
sleep-idle-seconds = 300

# GPU settings for RTX 3050 Laptop
n-gpu-layers = 99

# Context and performance
c = 4096
flash-attn = true
cache-type-k = q4_0
cache-type-v = q4_0

# Default model (auto-downloaded from HuggingFace on first use)
[unsloth/Qwen3.5-4B-GGUF:Q4_K_M]
chat-template = qwen
load-on-startup = false
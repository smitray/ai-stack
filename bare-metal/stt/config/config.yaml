# Whisper STT Configuration
# ~/.config/ai-stack/stt/config.yaml

server:
  host: "127.0.0.1"
  port: 7861
  workers: 1

model:
  name: "deepdml/faster-whisper-large-v3-turbo-ct2"
  device: "auto"
  compute_type: "float16"
  # Eager mode: model loads on server startup (~1.5-2 GB VRAM).
  # Lazy mode: set to false, model loads on first request.
  # Eager is recommended for VRAM-constrained systems to avoid
  # unexpected memory pressure during transcription.
  load_on_startup: true

gpu:
  min_vram_mb: 1500
  fallback_to_cpu: true

idle:
  timeout_seconds: 600
  check_interval: 10

logging:
  level: "INFO"
  format: "json"
  file: ""  # Empty = stdout only
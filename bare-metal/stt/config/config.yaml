# Whisper STT Configuration
# ~/.config/ai-stack/stt/config.yaml

server:
  host: "127.0.0.1"
  port: 7861
  workers: 1

model:
  name: "deepdml/faster-whisper-large-v3-turbo-ct2"
  device: "auto"
  compute_type: "float16"
  load_on_startup: true  # Set to false to delay model load until first request

gpu:
  min_vram_mb: 1500
  fallback_to_cpu: true

idle:
  timeout_seconds: 600
  check_interval: 10

logging:
  level: "INFO"
  format: "json"
  file: ""  # Empty = stdout only